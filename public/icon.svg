<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- 盾牌轮廓 -->
  <path d="M256 80L160 140V240C160 340 200 420 256 448C312 420 352 340 352 240V140L256 80Z" 
        fill="url(#shieldGradient)" 
        stroke="white" 
        stroke-width="8"
        stroke-linejoin="round"/>
  
  <!-- 盾牌内部对勾 -->
  <path d="M220 260L248 288L292 232" 
        stroke="white" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- 顶部装饰文字 C1 -->
  <text x="256" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">C1</text>
</svg>